<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Mathematica Pro">
    <meta name="theme-color" content="#0a0a1a">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%234f46e5'/%3E%3Ctext x='50' y='68' font-size='50' text-anchor='middle' fill='white' font-weight='bold'%3E∑%3C/text%3E%3C/svg%3E">
    <title>Mathematica Pro</title>
    <style>
        /* Адаптация под iOS */
        @supports (padding: max(0px)) {
            body {
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }
        }
        
        /* Скрываем адресную строку при скролле на iOS */
        html, body {
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        /* Улучшенный скролл */
        .steps-box, .result-visual {
            -webkit-overflow-scrolling: touch;
        }
        
        /* Убираем стандартные стили кнопок на iOS */
        button, .tool-btn, .mode-btn, .main-btn {
            -webkit-appearance: none;
            appearance: none;
        }
        
        /* Остальные стили такие же, как в предыдущей версии */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0a0a1a, #050510);
            color: #e8edf5;
            padding: 1rem;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(45deg, rgba(79,70,229,0.03) 0px, rgba(79,70,229,0.03) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 1rem 0;
            border-bottom: 1px solid rgba(96, 165, 250, 0.2);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #a5b4fc, #818cf8, #60a5fa, #34d399);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 6s ease infinite;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .sub {
            color: #7c8ba0;
            margin-top: 0.3rem;
            font-size: 0.7rem;
            font-weight: 400;
        }

        .mode-switch {
            display: flex;
            gap: 0.4rem;
            justify-content: center;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .mode-btn {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(96, 165, 250, 0.15);
            padding: 0.45rem 0.9rem;
            border-radius: 1.5rem;
            color: #94a3b8;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .mode-btn:hover {
            border-color: rgba(96, 165, 250, 0.4);
            color: #cbd5e1;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.7), rgba(124, 58, 237, 0.7));
            border-color: rgba(96, 165, 250, 0.5);
            color: white;
        }

        .editor-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.25rem;
            border: 1px solid rgba(96, 165, 250, 0.15);
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.4);
        }

        .input-area {
            background: rgba(10, 14, 23, 0.8);
            border-radius: 1rem;
            padding: 1rem;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.8rem;
        }

        .number-input, .text-input {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.6rem;
            padding: 0.65rem;
            width: 140px;
            font-size: 0.9rem;
            color: #e2e8f0;
            text-align: center;
            transition: all 0.2s;
            font-family: inherit;
        }

        .select-task {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.6rem;
            padding: 0.65rem;
            color: #e2e8f0;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
        }

        .toolbar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .tool-btn {
            background: linear-gradient(135deg, rgba(51, 65, 85, 0.8), rgba(30, 41, 59, 0.8));
            border: 1px solid rgba(96, 165, 250, 0.2);
            padding: 0.6rem;
            border-radius: 1.5rem;
            color: #cbd5e1;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.15s;
            font-family: inherit;
        }

        .tool-btn.primary {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border: none;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }

        .tool-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(79, 70, 229, 0.4);
        }

        .result-card {
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(10, 14, 23, 0.9));
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            text-align: center;
            border: 1px solid rgba(96, 165, 250, 0.15);
        }

        .result-label {
            font-size: 0.7rem;
            color: #7c8ba0;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .result-visual {
            font-size: 1rem;
            font-weight: 500;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            padding: 0.5rem;
            word-break: break-word;
            white-space: pre-wrap;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
        }

        .steps-box {
            background: rgba(10, 14, 23, 0.7);
            border-radius: 0.8rem;
            padding: 0.9rem;
            margin-top: 0.8rem;
            font-family: 'Fira Code', 'Monaco', monospace;
            font-size: 0.7rem;
            white-space: pre-wrap;
            color: #8ba4c4;
            max-height: 350px;
            overflow-y: auto;
            line-height: 1.5;
            border: 1px solid rgba(96, 165, 250, 0.1);
        }

        .warning {
            color: #fbbf24;
            font-size: 0.6rem;
            text-align: center;
            margin-top: 0.6rem;
            opacity: 0.7;
        }

        canvas {
            background: #0f172a;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
            max-width: 100%;
            height: auto;
        }

        footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.55rem;
            color: #475569;
        }

        @media (max-width: 480px) {
            .toolbar { grid-template-columns: repeat(2, 1fr); }
            .mode-btn { font-size: 0.6rem; padding: 0.35rem 0.7rem; }
            .number-input { width: 110px; }
        }
        
        /* Анимация нажатия для iOS */
        button:active, .tool-btn:active, .mode-btn:active {
            transform: scale(0.97);
            transition: transform 0.05s;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>MATHEMATICA PRO</h1>
        <div class="sub">ВЫЧИСЛИТЕЛЬНАЯ СИСТЕМА | 8 МОДУЛЕЙ</div>
    </div>

    <div class="mode-switch" id="modeSwitch">
        <button class="mode-btn" data-mode="fractions">Дроби</button>
        <button class="mode-btn" data-mode="mixed">Смешанные</button>
        <button class="mode-btn" data-mode="divisibility">Делимость</button>
        <button class="mode-btn" data-mode="integers">Отрицательные</button>
        <button class="mode-btn" data-mode="coordinates">Координаты</button>
        <button class="mode-btn" data-mode="algebra">Алгебра</button>
        <button class="mode-btn" data-mode="equations">Уравнения</button>
        <button class="mode-btn" data-mode="geometry">Геометрия</button>
    </div>

    <div class="editor-card" id="mainCard">
        <div id="modeContent"></div>
        <div class="result-card">
            <div class="result-label">РЕЗУЛЬТАТ</div>
            <div id="resultVisual" class="result-visual">—</div>
            <div id="resultExtra"></div>
        </div>
        <div class="steps-box" id="stepsBox">Выберите вычислительный модуль</div>
        <div class="warning">ВСЕ ВЫЧИСЛЕНИЯ ВЫПОЛНЯЮТСЯ С ВЫСОКОЙ ТОЧНОСТЬЮ</div>
    </div>
    <footer>MATHEMATICA PRO | 8 МОДУЛЕЙ</footer>
</div>

<script>
    // ==================== БАЗОВЫЕ ФУНКЦИИ (те же, что в предыдущей версии) ====================
    function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ let t=b; b=a%b; a=t; } return a; }
    function lcm(a,b){ return Math.abs(a*b)/gcd(a,b); }
    function simplifyFraction(num,den){ let g=gcd(num,den); return {num:num/g, den:den/g}; }
    function improperToMixed(num,den){
        let sign=num<0?-1:1, absNum=Math.abs(num), whole=Math.floor(absNum/den), rem=absNum%den;
        if(rem===0) return {whole:sign*whole, num:0, den:1};
        let g=gcd(rem,den);
        return {whole:sign*whole, num:rem/g, den:den/g};
    }
    function mixedToImproper(whole,num,den){
        let sign=whole<0?-1:1, absWhole=Math.abs(whole);
        return {num:sign*(absWhole*den+num), den:den};
    }

    // ==================== 1. ОБЫЧНЫЕ ДРОБИ ====================
    function fractionsMode(){
        return `<div class="input-area"><div class="input-group"><input type="text" id="fracExpr" class="number-input" placeholder="2/3+1/4" value="2/3+1/4" style="width:200px;"></div></div>
                <button class="tool-btn primary" id="fracBtn" style="width:100%">ВЫЧИСЛИТЬ</button>`;
    }

    // ==================== 2. СМЕШАННЫЕ ДРОБИ ====================
    let mixedExpr=[{type:"mixed",whole:2,num:1,den:2},{type:"operator",value:"+"},{type:"mixed",whole:1,num:1,den:4}];
    function renderMixed(){
        let container=document.getElementById("mixedLine");
        if(!container) return;
        container.innerHTML="";
        mixedExpr.forEach((item,idx)=>{
            if(item.type==="mixed"){
                let div=document.createElement("div");
                div.style.cssText="display:inline-flex;align-items:center;gap:0.3rem;background:rgba(30,41,59,0.6);padding:0.4rem;border-radius:0.8rem;position:relative;border:1px solid rgba(96,165,250,0.2);";
                div.innerHTML=`<input type="number" class="mwhole" value="${item.whole}" data-idx="${idx}" style="width:50px;background:#0f172a;border:1px solid #334155;border-radius:0.4rem;padding:0.3rem;text-align:center;color:white;">
                    <div style="display:inline-flex;flex-direction:column;align-items:center;">
                        <input type="number" class="mnum" value="${item.num}" data-idx="${idx}" style="width:40px;background:#0f172a;border:1px solid #334155;border-radius:0.3rem;padding:0.2rem;text-align:center;color:white;">
                        <div style="width:30px;height:2px;background:#60a5fa;margin:2px 0;"></div>
                        <input type="number" class="mden" value="${item.den}" data-idx="${idx}" style="width:40px;background:#0f172a;border:1px solid #334155;border-radius:0.3rem;padding:0.2rem;text-align:center;color:white;">
                    </div>
                    <button class="delMixed" data-idx="${idx}" style="background:#7f1d1d;border:none;width:20px;height:20px;border-radius:50%;color:white;cursor:pointer;position:absolute;top:-6px;right:-6px;font-size:10px;">✕</button>`;
                container.appendChild(div);
            } else if(item.type==="operator"){
                let opDiv=document.createElement("button");
                opDiv.textContent=item.value;
                opDiv.style.cssText="background:#4f46e5;border:none;width:45px;height:45px;border-radius:0.8rem;font-size:1.2rem;color:white;cursor:default;opacity:0.8;";
                opDiv.disabled=true;
                container.appendChild(opDiv);
            }
        });
        document.querySelectorAll(".mwhole,.mnum,.mden").forEach(inp=>{
            inp.addEventListener("change",(e)=>{
                let idx=parseInt(inp.dataset.idx);
                let val=parseInt(inp.value)||0;
                if(mixedExpr[idx]){
                    if(inp.classList.contains("mwhole")) mixedExpr[idx].whole=val;
                    if(inp.classList.contains("mnum")) mixedExpr[idx].num=val;
                    if(inp.classList.contains("mden") && val!==0) mixedExpr[idx].den=val;
                }
                renderMixed();
            });
        });
        document.querySelectorAll(".delMixed").forEach(btn=>{
            btn.addEventListener("click",()=>{
                let idx=parseInt(btn.dataset.idx);
                mixedExpr.splice(idx,1);
                if(mixedExpr.length===0) mixedExpr=[{type:"mixed",whole:1,num:1,den:2}];
                renderMixed();
            });
        });
    }
    function calcMixed(){
        let tokens=[];
        for(let item of mixedExpr){
            if(item.type==="mixed"){
                let imp=mixedToImproper(item.whole,item.num,item.den);
                tokens.push({type:"num",num:imp.num,den:imp.den});
            } else if(item.type==="operator") tokens.push({type:"op",value:item.value});
        }
        let working=JSON.parse(JSON.stringify(tokens));
        let i=0;
        while(i<working.length){
            if(working[i].type==="op" && (working[i].value==="×"||working[i].value==="÷")){
                let l=working[i-1], r=working[i+1], res;
                if(working[i].value==="×") res={num:l.num*r.num, den:l.den*r.den};
                else res={num:l.num*r.den, den:l.den*r.num};
                let g=gcd(res.num,res.den);
                if(g>1){ res.num/=g; res.den/=g; }
                working.splice(i-1,3,{type:"num",num:res.num,den:res.den});
                i=0;
            } else i++;
        }
        i=0;
        while(working.length>1){
            if(working[i].type==="op"){
                let l=working[i-1], r=working[i+1], res;
                let cd=lcm(l.den,r.den);
                let nl=l.num*(cd/l.den), nr=r.num*(cd/r.den);
                if(working[i].value==="+") res={num:nl+nr, den:cd};
                else res={num:nl-nr, den:cd};
                let g=gcd(res.num,res.den);
                if(g>1){ res.num/=g; res.den/=g; }
                working.splice(i-1,3,{type:"num",num:res.num,den:res.den});
                i=0;
            } else i++;
        }
        let s=simplifyFraction(working[0].num,working[0].den);
        let m=improperToMixed(s.num,s.den);
        let result=m.num===0?`${m.whole}`:(m.whole!==0?`${m.whole} ${m.num}/${m.den}`:`${m.num}/${m.den}`);
        document.getElementById("resultVisual").innerHTML=result;
        document.getElementById("resultExtra").innerHTML=`≈ ${(s.num/s.den).toFixed(6)}`;
        document.getElementById("stepsBox").innerHTML="ВЫЧИСЛЕНИЕ ВЫПОЛНЕНО";
    }
    function mixedMode(){
        return `<div class="input-area"><div id="mixedLine" style="display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:0.5rem;min-height:100px;"></div>
                <div style="display:flex;gap:0.4rem;justify-content:center;margin-top:0.5rem;flex-wrap:wrap;">
                    <button class="tool-btn" id="addMixFrac">Добавить</button>
                    <button class="tool-btn" id="addMixPlus">+</button><button class="tool-btn" id="addMixMinus">−</button>
                    <button class="tool-btn" id="addMixMul">×</button><button class="tool-btn" id="addMixDiv">÷</button>
                    <button class="tool-btn" id="clearMix">Очистить</button>
                </div></div>
                <button class="tool-btn primary" id="calcMixBtn" style="width:100%;margin-top:0.5rem;">ВЫЧИСЛИТЬ</button>`;
    }

    // ==================== 3. ДЕЛИМОСТЬ ====================
    function divisibilityMode(){
        return `<div class="input-area"><div class="input-group"><input type="number" id="d1" class="number-input" value="24"><input type="number" id="d2" class="number-input" value="36"></div>
                <div class="input-group"><select id="divTask" class="select-task">
                    <option value="divisors">Делители числа</option><option value="prime">Проверка на простоту</option>
                    <option value="factors">Разложение на множители</option><option value="gcd">НОД</option>
                    <option value="lcm">НОК</option><option value="multiples">Кратные числа</option>
                </select></div>
                <div id="multCountDiv" style="display:none;"><input type="number" id="multCount" class="number-input" value="10"></div></div>
                <button class="tool-btn primary" id="divBtn" style="width:100%">ВЫЧИСЛИТЬ</button>`;
    }

    // ==================== 4. ОТРИЦАТЕЛЬНЫЕ ЧИСЛА ====================
    function integersMode(){
        return `<div class="input-area"><div class="input-group"><input type="number" id="ia" class="number-input" value="-5"><input type="number" id="ib" class="number-input" value="3"></div>
                <div class="input-group"><select id="intTask" class="select-task">
                    <option value="abs">Модуль числа</option><option value="compare">Сравнение</option>
                    <option value="add">Сложение</option><option value="subtract">Вычитание</option>
                    <option value="multiply">Умножение</option><option value="divide">Деление</option>
                </select></div></div>
                <button class="tool-btn primary" id="intBtn" style="width:100%">ВЫЧИСЛИТЬ</button>`;
    }

    // ==================== 5. КООРДИНАТЫ ====================
    function drawCoordinatePlane(x,y){
        let canvas=document.getElementById("coordCanvas");
        if(!canvas) return;
        let ctx=canvas.getContext("2d");
        let w=canvas.width=320, h=canvas.height=320;
        ctx.fillStyle="#0f172a"; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle="#334155"; ctx.lineWidth=1;
        let cx=w/2, cy=h/2;
        ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(w,cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,h); ctx.stroke();
        ctx.fillStyle="#60a5fa"; ctx.font="9px monospace";
        for(let i=-6;i<=6;i++){
            let px=cx+i*25;
            if(px>=0 && px<=w){ ctx.fillText(i,px-3,cy+12); }
            let py=cy-i*25;
            if(py>=0 && py<=h){ ctx.fillText(i,cx+5,py+3); }
        }
        ctx.fillStyle="#c084fc";
        let px=cx+x*25, py=cy-y*25;
        if(px>=0 && px<=w && py>=0 && py<=h){
            ctx.beginPath(); ctx.arc(px,py,5,0,2*Math.PI); ctx.fill();
            ctx.fillStyle="#fbbf24"; ctx.font="10px monospace";
            ctx.fillText(`(${x},${y})`,px+8,py-5);
        }
    }
    function coordinatesMode(){
        return `<div class="input-area"><div class="input-group"><input type="number" id="cx" class="number-input" placeholder="X" value="2"><input type="number" id="cy" class="number-input" placeholder="Y" value="3"></div>
                <canvas id="coordCanvas" width="320" height="320" style="width:100%;max-width:320px;margin:0 auto;display:block;"></canvas></div>
                <button class="tool-btn primary" id="coordBtn" style="width:100%;margin-top:0.5rem;">ПОСТРОИТЬ</button>`;
    }

    // ==================== 6. АЛГЕБРА ====================
    function algebraMode(){
        return `<div class="input-area"><div class="input-group"><input type="text" id="algExpr" class="number-input" placeholder="3*(x+2)" value="3*(x+2)" style="width:200px;"></div>
                <button class="tool-btn primary" id="algBtn" style="width:100%">РАСКРЫТЬ СКОБКИ</button></div>`;
    }

    // ==================== 7. УРАВНЕНИЯ ====================
    function solveLinear(expr){
        expr=expr.replace(/\s/g,'');
        let sides=expr.split('=');
        if(sides.length!==2) throw new Error("Формат: ax+b=c");
        let left=sides[0], right=parseFloat(sides[1]);
        if(isNaN(right)) throw new Error("Правая часть должна быть числом");
        
        let xCoeff=0, constVal=0;
        let parts=left.split(/([+-])/);
        let sign=1;
        for(let i=0;i<parts.length;i++){
            if(parts[i]==='+'||parts[i]==='-'){ sign=parts[i]==='+'?1:-1; continue; }
            let term=parts[i];
            if(term.includes('x')){
                let coeff=term.replace('x','');
                if(coeff===''||coeff==='+') coeff=1;
                else if(coeff==='-') coeff=-1;
                else coeff=parseFloat(coeff);
                xCoeff+=sign*coeff;
            } else if(term!==''){
                constVal+=sign*parseFloat(term);
            }
        }
        if(xCoeff===0) throw new Error("Нет переменной x");
        let x=(right-constVal)/xCoeff;
        return {x:x, steps:`${left} = ${right}\n${xCoeff}x + ${constVal} = ${right}\n${xCoeff}x = ${right-constVal}\nx = ${x}`};
    }
    function equationsMode(){
        return `<div class="input-area"><div class="input-group"><input type="text" id="eqExpr" class="number-input" placeholder="2x+3=7" value="2x+3=7" style="width:200px;"></div></div>
                <button class="tool-btn primary" id="eqBtn" style="width:100%">РЕШИТЬ</button>`;
    }

    // ==================== 8. ГЕОМЕТРИЯ ====================
    function drawPieChart(data){
        let canvas=document.getElementById("pieCanvas");
        if(!canvas) return;
        let ctx=canvas.getContext("2d");
        let w=canvas.width=280, h=canvas.height=280;
        ctx.fillStyle="#0f172a"; ctx.fillRect(0,0,w,h);
        let total=data.reduce((a,b)=>a+b,0);
        if(total===0) return;
        let colors=["#c084fc","#60a5fa","#34d399","#fbbf24","#f87171","#a855f7"];
        let start=0;
        for(let i=0;i<data.length;i++){
            let angle=(data[i]/total)*2*Math.PI;
            ctx.beginPath();
            ctx.fillStyle=colors[i%colors.length];
            ctx.moveTo(w/2,h/2);
            ctx.arc(w/2,h/2,w/2-12,start,start+angle);
            ctx.fill();
            start+=angle;
        }
    }
    function geometryMode(){
        return `<div class="input-area"><div class="input-group"><select id="geoTask" class="select-task">
                    <option value="circle">Окружность и круг</option><option value="chart">Круговая диаграмма</option>
                </select></div>
                <div id="circleDiv"><div class="input-group"><input type="number" id="radius" class="number-input" placeholder="Радиус" value="5"></div></div>
                <div id="chartDiv" style="display:none;"><div class="input-group"><input type="text" id="chartData" class="number-input" placeholder="30,50,20" value="30,50,20" style="width:160px;"></div></div>
                <canvas id="pieCanvas" width="280" height="280" style="width:100%;max-width:280px;margin:0 auto;display:block;"></canvas></div>
                <button class="tool-btn primary" id="geoBtn" style="width:100%;margin-top:0.5rem;">ВЫЧИСЛИТЬ</button>`;
    }

    // ==================== ЗАГРУЗЧИК ====================
    let currentMode = "fractions";

    function loadMode(mode){
        currentMode=mode;
        let contentDiv=document.getElementById("modeContent");
        if(mode==="fractions") contentDiv.innerHTML=fractionsMode();
        else if(mode==="mixed") contentDiv.innerHTML=mixedMode();
        else if(mode==="divisibility") contentDiv.innerHTML=divisibilityMode();
        else if(mode==="integers") contentDiv.innerHTML=integersMode();
        else if(mode==="coordinates") contentDiv.innerHTML=coordinatesMode();
        else if(mode==="algebra") contentDiv.innerHTML=algebraMode();
        else if(mode==="equations") contentDiv.innerHTML=equationsMode();
        else if(mode==="geometry") contentDiv.innerHTML=geometryMode();
        
        document.getElementById("resultVisual").innerHTML="—";
        document.getElementById("stepsBox").innerHTML="Выберите вычислительный модуль";
        document.getElementById("resultExtra").innerHTML="";
        
        // Привязка событий (аналогично предыдущей версии)
        if(mode==="fractions"){
            document.getElementById("fracBtn")?.addEventListener("click",()=>{
                let val=document.getElementById("fracExpr").value;
                try{ 
                    let expr=val.replace(/\s/g,'');
                    let parts=expr.split(/([+\-*/])/);
                    let parse=(str)=>str.includes('/')?{num:parseInt(str.split('/')[0]), den:parseInt(str.split('/')[1])}:{num:parseInt(str), den:1};
                    let result=parse(parts[0]);
                    for(let i=1;i<parts.length;i+=2){
                        let op=parts[i], next=parse(parts[i+1]);
                        if(op==='+') result={num:result.num*next.den+next.num*result.den, den:result.den*next.den};
                        else if(op==='-') result={num:result.num*next.den-next.num*result.den, den:result.den*next.den};
                        else if(op==='*') result={num:result.num*next.num, den:result.den*next.den};
                        else if(op==='/') result={num:result.num*next.den, den:result.den*next.num};
                    }
                    let s=simplifyFraction(result.num,result.den);
                    document.getElementById("resultVisual").innerHTML=`${s.num}/${s.den} = ${(s.num/s.den).toFixed(6)}`;
                    document.getElementById("stepsBox").innerHTML="ВЫЧИСЛЕНИЕ ВЫПОЛНЕНО";
                } catch(e){ document.getElementById("resultVisual").innerHTML="ОШИБКА"; document.getElementById("stepsBox").innerHTML=e.message; }
            });
        }
        if(mode==="mixed"){ 
            renderMixed();
            document.getElementById("addMixFrac")?.addEventListener("click",()=>{ mixedExpr.push({type:"mixed",whole:1,num:1,den:2}); renderMixed(); });
            document.getElementById("addMixPlus")?.addEventListener("click",()=>{ mixedExpr.push({type:"operator",value:"+"}); renderMixed(); });
            document.getElementById("addMixMinus")?.addEventListener("click",()=>{ mixedExpr.push({type:"operator",value:"-"}); renderMixed(); });
            document.getElementById("addMixMul")?.addEventListener("click",()=>{ mixedExpr.push({type:"operator",value:"×"}); renderMixed(); });
            document.getElementById("addMixDiv")?.addEventListener("click",()=>{ mixedExpr.push({type:"operator",value:"÷"}); renderMixed(); });
            document.getElementById("clearMix")?.addEventListener("click",()=>{ mixedExpr=[{type:"mixed",whole:2,num:1,den:2}]; renderMixed(); });
            document.getElementById("calcMixBtn")?.addEventListener("click",calcMixed);
        }
        if(mode==="divisibility"){
            document.getElementById("divTask")?.addEventListener("change",()=>{
                let val=document.getElementById("divTask").value;
                document.getElementById("multCountDiv").style.display=val==="multiples"?"flex":"none";
            });
            document.getElementById("divBtn")?.addEventListener("click",()=>{
                let a=parseInt(document.getElementById("d1").value), b=parseInt(document.getElementById("d2").value), t=document.getElementById("divTask").value, res="";
                if(t==="divisors"){ let d=[]; for(let i=1;i<=Math.sqrt(a);i++){ if(a%i===0){ d.push(i); if(i!==a/i) d.push(a/i); } } d.sort((x,y)=>x-y); res=`ДЕЛИТЕЛИ ${a}: ${d.join(", ")}`; }
                if(t==="prime"){ let prime=a>1; for(let i=2;i<=Math.sqrt(a);i++) if(a%i===0){ prime=false; break; } res=`${a} — ${prime?"ПРОСТОЕ":"СОСТАВНОЕ"}`; }
                if(t==="factors"){ let f=[], n=a; for(let i=2;i<=Math.sqrt(n);i++){ while(n%i===0){ f.push(i); n/=i; } } if(n>1) f.push(n); res=`${a} = ${f.join(" × ")}`; }
                if(t==="gcd") res=`НОД(${a},${b}) = ${gcd(a,b)}`;
                if(t==="lcm") res=`НОК(${a},${b}) = ${lcm(a,b)}`;
                if(t==="multiples"){ let cnt=parseInt(document.getElementById("multCount").value)||10, m=[]; for(let i=1;i<=cnt;i++) m.push(a*i); res=`КРАТНЫЕ ${a}: ${m.join(", ")}`; }
                document.getElementById("resultVisual").innerHTML=res; document.getElementById("stepsBox").innerHTML="ВЫЧИСЛЕНИЕ ВЫПОЛНЕНО";
            });
        }
        if(mode==="integers"){
            document.getElementById("intBtn")?.addEventListener("click",()=>{
                let a=parseFloat(document.getElementById("ia").value), b=parseFloat(document.getElementById("ib").value), t=document.getElementById("intTask").value, res="";
                if(t==="abs") res=`|${a}| = ${Math.abs(a)}, |${b}| = ${Math.abs(b)}`;
                if(t==="compare") res=`${a} ${a>b?">":(a<b?"<":"=")} ${b}`;
                if(t==="add") res=`${a} + ${b} = ${a+b}`;
                if(t==="subtract") res=`${a} - ${b} = ${a-b}`;
                if(t==="multiply") res=`${a} × ${b} = ${a*b}`;
                if(t==="divide") res=b===0?"ДЕЛЕНИЕ НА НОЛЬ":`${a} ÷ ${b} = ${(a/b).toFixed(6)}`;
                document.getElementById("resultVisual").innerHTML=res; document.getElementById("stepsBox").innerHTML="ВЫЧИСЛЕНИЕ ВЫПОЛНЕНО";
            });
        }
        if(mode==="coordinates"){
            document.getElementById("coordBtn")?.addEventListener("click",()=>{
                let x=parseFloat(document.getElementById("cx").value), y=parseFloat(document.getElementById("cy").value);
                drawCoordinatePlane(x,y);
                document.getElementById("resultVisual").innerHTML=`ТОЧКА (${x}, ${y})`;
                document.getElementById("stepsBox").innerHTML="КООРДИНАТНАЯ ПЛОСКОСТЬ";
            });
            drawCoordinatePlane(2,3);
        }
        if(mode==="algebra"){
            document.getElementById("algBtn")?.addEventListener("click",()=>{
                let expr=document.getElementById("algExpr").value;
                let res=expr.replace(/\s/g,'');
                let match=res.match(/([+-]?\d*\.?\d*)\*?\(([^)]+)\)/);
                if(match){
                    let a=match[1]===''||match[1]==='+'?1:(match[1]==='-'?-1:parseFloat(match[1]));
                    let inner=match[2];
                    let terms=inner.split(/([+-])/);
                    let result=[];
                    let currentSign=1;
                    for(let i=0;i<terms.length;i++){
                        if(terms[i]==='+'||terms[i]==='-'){ currentSign=terms[i]==='+'?1:-1; continue; }
                        let term=terms[i];
                        let coeff=parseFloat(term) || (term.includes('x')?1:0);
                        if(isNaN(coeff)) coeff=term.includes('x')?1:0;
                        let newCoeff=a*currentSign*coeff;
                        if(term.includes('x')) result.push(`${newCoeff>0?'+':''}${newCoeff}x`);
                        else if(newCoeff!==0) result.push(`${newCoeff>0?'+':''}${newCoeff}`);
                    }
                    let final=result.join('').replace(/^\+/,'');
                    document.getElementById("resultVisual").innerHTML=final;
                    document.getElementById("stepsBox").innerHTML=`РАСКРЫТИЕ СКОБОК:\n${expr} = ${final}`;
                } else { document.getElementById("resultVisual").innerHTML=expr; document.getElementById("stepsBox").innerHTML="НЕЛЬЗЯ РАСКРЫТЬ СКОБКИ"; }
            });
        }
        if(mode==="equations"){
            document.getElementById("eqBtn")?.addEventListener("click",()=>{
                let expr=document.getElementById("eqExpr").value;
                try{ let sol=solveLinear(expr); document.getElementById("resultVisual").innerHTML=`x = ${sol.x}`; document.getElementById("stepsBox").innerHTML=sol.steps; }
                catch(e){ document.getElementById("resultVisual").innerHTML="ОШИБКА"; document.getElementById("stepsBox").innerHTML=e.message; }
            });
        }
        if(mode==="geometry"){
            document.getElementById("geoTask")?.addEventListener("change",()=>{
                let val=document.getElementById("geoTask").value;
                document.getElementById("circleDiv").style.display=val==="circle"?"flex":"none";
                document.getElementById("chartDiv").style.display=val==="chart"?"flex":"none";
            });
            document.getElementById("geoBtn")?.addEventListener("click",()=>{
                let task=document.getElementById("geoTask").value;
                if(task==="circle"){
                    let r=parseFloat(document.getElementById("radius").value);
                    let length=2*Math.PI*r;
                    let area=Math.PI*r*r;
                    document.getElementById("resultVisual").innerHTML=`C = ${length.toFixed(4)}, S = ${area.toFixed(4)}`;
                    document.getElementById("stepsBox").innerHTML=`ОКРУЖНОСТЬ R=${r}\nC = 2πr = ${length.toFixed(4)}\nS = πr² = ${area.toFixed(4)}`;
                } else if(task==="chart"){
                    let dataStr=document.getElementById("chartData").value;
                    let data=dataStr.split(',').map(Number);
                    drawPieChart(data);
                    document.getElementById("resultVisual").innerHTML=`ДИАГРАММА ПОСТРОЕНА`;
                    document.getElementById("stepsBox").innerHTML=`ДАННЫЕ: ${data.join(", ")}`;
                }
            });
            document.getElementById("geoTask")?.dispatchEvent(new Event("change"));
            drawPieChart([30,50,20]);
        }
    }
    
    document.querySelectorAll(".mode-btn").forEach(btn=>{
        btn.addEventListener("click",()=>{
            document.querySelectorAll(".mode-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            loadMode(btn.dataset.mode);
        });
    });
    
    loadMode("fractions");
</script>
</body>
</html>
